name: Update results

on:
  # Driven every ~10 min via the REST API (workflow_dispatch) by an external cron (cron-job.org).
  # GitHub's own `schedule` trigger proved unreliable on this repo, so it was removed.
  workflow_dispatch:

# Only needs to commit results.json. No deploy: the app reads live data from raw.githubusercontent,
# which updates the moment this commit lands — so a data update never needs a Pages rebuild.
permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # fetch-results.mjs is pure Node (global fetch, no dependencies) — no npm install needed.
      # Uses football-data.org when FOOTBALL_DATA_TOKEN is set; otherwise openfootball (no key).
      - name: Fetch results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/fetch-results.mjs

      - name: Commit if results changed
        run: |
          git config user.name "results-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/results.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update results ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
